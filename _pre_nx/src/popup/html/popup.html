<!-- popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title></title>
    <link href="../../fontawesome/css/fontawesome.css" rel="stylesheet">
    <link href="../../fontawesome/css/brands.css" rel="stylesheet">
    <link href="../../fontawesome/css/solid.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="../../css/popup.css">
</head>
<body>
    <img class="logo-icon" src="../../images/icon-32.png">
    <div id="close-window"><button class="program-button program-square-button-small" title="Close the popup.">x</button></div>
    <div class="title">
        Autochrome
    </div>
    <div class="content">
        <div class="browsers-tabs-holder">
            <label for="browsers-tabs-select">Chose a Tab</label>
            <select id="browsers-tabs-select"></select>
        </div>
        <div class="file-upload-with-options">
            <label class="custom-file-upload">
                <input id="file-selector" type="file" accept="application/json" multiple/>
                Upload a program
            </label>
            <a id="a-set-current" class="a-set-current">[set current]</a>
            <div class="input-label-option">
                <input id="auto-play" name="autoPlay" type="checkbox">
                <label for="auto-play">Auto</label>
            </div>
        </div>
        <div id="uploaded-programs-holder" class="uploaded-programs-holder">

        </div>
    </div>
    <div class="action-button-holder">
        <!--button id="program-edit-button" class="program-button action-button">Create a Program</button-->
    </div>
<script type="text/javascript" src="../../scripts/popup.js"></script>
</body>
</html>
